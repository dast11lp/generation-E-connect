        </nav>

    <main class="contenedor-main">
        <div class="contenedor-main-header">
            <h1>Grabaciones y webinars</h1>
            <p>Sesiones grabadas por el equipo Generation para seguir aprendiendo.</p>
            <input id="busqueda-sesiones" type="text" placeholder="Buscar sesiones...">
            <button class="btn-buscar-sesiones">Buscar</button>
            <div class="filtros-busqueda-sesiones">
                <a href="#">Todas</a>

    <!-- <div class="grabaciones">

    </div> -->

    <!-- Fin cambios Alejandro navbar y main -->

    <!--  cambios Jaime inicio -->
    <section class="section-grabaciones">
        <!-- <h2>Grabaciones y webinars</h2> -->

        <div id="tarjetas-grabaciones" class="grid-grabaciones">

        </div>

    </section>
    <!-- cambios Jaime final -->



    <!--Inicio formulario Henry-->
    <form id="formulario_video">
        <div id="form" class="form">
            <p>Sube aquí tu video o archivo.</p>
            <input type="file" id="videoFile" accept="video/*">
        </div>

        <label for="videoUrl" id="url">Aquí el enlace de tu video:</label>
        <input type="url" id="videoUrl" placeholder="https://ejemplo.com" />

        <label for="category">Tu categoria</label>
        <select id="category" name="tu_categoria">
            <option value="tutorial">Full-Stack/Java</option>
            <option value="entretenimiento">Soporte TI</option>
            <option value="educacion">Unity</option>
            <option value="educacion">Marketing digital</option>
        </select>

        <!-- Descripción -->
        <label for="description">Descripción:</label>
        <textarea id="description" placeholder="Realiza una breve descripion." name="description"></textarea>

        <!-- Campos ocultos o automáticos -->
        <input type="hidden" id="username" value="UsuarioActual" />
        <input type="hidden" id="uploadDate" />

        <button type="submit">Agregar video</button>
    </form>
    <!--Fin formularo Henry-->

    <script src="admin.js"></script>
</body>

</html>
