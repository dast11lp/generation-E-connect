<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About-Us</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../footer/footer.css">
    <link rel="stylesheet" href="../navbar/navbar.css">
  </head>

  <body>
    <div id="navbar-container"></div>
    <div class="contenedor1">
      <h2 class="subtitulo">Contáctanos<br> ¡Queremos escucharte!</h2>
    </div>
    <p class="mensaje">
        Si tienes preguntas sobre nuestros programas, mentorias, o necesitas
        ayuda, déjanos tu mensaje. Por favor diligencia el formulario con tus
        datos y en breve un miembro del equipo se pondrá en contacto contigo.
        Estamos aquí para apoyarte.
    </p>

    <!-- INICIO CAMBIO JAIME - SECCIÓN CONTACTO -->
    <div class="container">
      <form id="formulario-contacto" class="fs-form" target="_top">
        <div class="fs-field">
          <label class="fs-label" for="name">Nombre</label>
          <input class="fs-input" id="name" name="name" required />
          <span class="fs-error-msg" id="error-name"></span>
        </div>
        <div class="fs-field">
          <label class="fs-label" for="email">Correo</label>
          <input class="fs-input" id="email" name="email" required />
          <span class="fs-error-msg" id="error-email"></span>
        </div>
        <div class="fs-field">
          <label class="fs-label" for="number">Número celular</label>
          <input class="fs-input" id="number" name="number" />
          <span class="fs-error-msg" id="error-number"></span>
        </div>
        <div class="fs-field">
          <label class="fs-label" for="message">Mensaje</label>
          <textarea
            class="fs-textarea"
            id="message"
            name="message"
            required
          ></textarea>
          <span class="fs-error-msg" id="error-message"></span>
        </div>
        <div class="fs-button-group">
          <button id="enviar-contacto" class="fs-button" type="submit">
            Enviar
          </button>
        </div>
      </form>
    </div>
    <div id="footer-container"></div>
    <script src="../footer/footer.js"></script>
    <script src="../navbar/navbar.js"></script>
    <!-- FIN CAMBIO JAIME - SECCIÓN CONTACTO -->
    <script src="script.js"></script>
  </body>
</html>
