<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <h2>REGÍSTRATE</h2>
    <form action="/procesar-registro" method="POST">
        <div>
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" name="name" required placeholder="Tu nombre completo">
        </div>
        <div>
            <label for="phone">Número de Teléfono</label>
            <input type="tel" id="phone" name="phone" required placeholder="Tu número de teléfono">
        </div>
        <div>
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required placeholder="Tu correo electrónico">
        </div>
        <div>
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="Tu contraseña">
        </div>
        <div>
            <label for="confirm_password">Confirmar Contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirma tu contraseña">
        </div>
        <button type="submit">Regístrate</button>
    </form>
</body>
</html>
