<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Iniciar Sesión</title>
</head>

<body>

    <div class="contenedor-general-login">
        <img src="../assets/images/logos/usuario.png" alt="">
        <h2>Bienvenido de nuevo</h2>
        <h4>Inicia sesión para acceder a todos los recursos del Hub Alumni.</h4>
        <div class="contenedor-formulario-login">
            <form action="" class="form-login">
                <button id="login-google">Continuar con Google</button>
                <p id="txt-opcion">o con correo</p>
                <h3>Correo electrónico</h3>
                <input type="text" name="email" id="input-email">
                <h3>Contraseña</h3>
                <span>¿Olvidaste tu contraseña?</span>
                <input type="password" name="password" id="input-password">
                <button>👁️</button>
                <input type="checkbox">Mantener sesión iniciada</>
                <button>Ingresar</button>
            </form>
            <p>¿No tienes una cuenta? <span>Regístrate</span></p>
        </div>
    </div>


    <script src="login.js"></script>
</body>

</html>
