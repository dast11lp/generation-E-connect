<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Inicio de Sesión</title>
    <link rel="stylesheet" href="./inicio_sesion_styles.css">
    <link rel="stylesheet" href="../navbar/navbar.css">
</head>
<body>
    <div id="navbar-container"></div>
    <!-- Inicio HTML inicio de sesión Henry -->
    <main class="login-container">
        <header class="login-header">
            <img src="../assets/images/logos/Generation_Colombia_logo_NEW-BLUE.svg" alt="Logo de la Institución" class="logo">
            <h1>Bienvenidos de vuelta</h1>
            <p>¡Que emocionante verte de nuevo!</p>
        </header>


        <form class="login-form" id="login-form">
            

            <div class="form-group">
                <label for="email">Correo electrónico registrado</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="ejemplo@correo.com" 
                    required 
                    autocomplete="username"
                >
                <span class="help-text">Ingresa el correo electrónico que utilizaste para crear tu cuenta.</span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                    >
 
                    <button type="button" id="toggle-password" aria-label="Mostrar contraseña"><img src="../assets/images/ojo.png" alt=""></button>
                </div>
            </div>

            <div class="form-utilities">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember-me"> Recordarme
                </label>
                <a href="/recuperar-contrasena" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">Ingresar al Portal</button>
        </form>

        <div class="divider">
            <span>O ingresa con</span>
        </div>


        <div class="social-login">
            <a href="/auth/linkedin" class="btn-social linkedin">
                <img src="../assets/images/linkedin (2).png" alt="" aria-hidden="true"> LinkedIn
            </a>
            <a href="/auth/google" class="btn-social google">
                <img src="../assets/images/gmail.png" alt="" aria-hidden="true"> Google
            </a>
        </div>


        <footer class="login-footer">
            <p>¿Es tu primera vez aquí? <a href="../register/register2.html">Activa tu cuenta de exalumno</a></p>
        </footer>
    </main>
    <script src="login.js"></script>
    <script src="../navbar/navbar.js"></script>
</body>
</html>
<!-- Fin HTML inicio de sesión Henry -->
